<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog | Ms. Virginia Lee</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; margin: 0; }
    html, body { height: 100%; }
    .blog-frame { height: calc(100vh - 64px); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased flex flex-col">

  <div id="nav-placeholder"></div>

  <div class="blog-frame w-full" id="blog-embed">
    <iframe
      src="https://virginialee9.wixsite.com/isnsportfolio/blog"
      frameborder="0"
      style="width:100%;height:100%;display:block;border:none;"
      title="Virginia Lee — Blog"
      id="blog-iframe"
    ></iframe>
  </div>

  <!-- Fallback shown if iframe fails to load after 6 seconds -->
  <div id="blog-fallback" class="hidden flex-1 flex flex-col items-center justify-center py-20 px-4 text-center">
    <p class="text-4xl mb-4">✍️</p>
    <h2 class="text-xl font-bold text-slate-800 mb-2">Blog</h2>
    <p class="text-slate-500 mb-6 max-w-sm">
      My blog is hosted on Wix. Click below to open it in a new tab.
    </p>
    <a href="https://virginialee9.wixsite.com/isnsportfolio/blog"
       target="_blank" rel="noopener"
       class="inline-flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-6 py-3 rounded-full transition-colors">
      Open Blog
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
      </svg>
    </a>
  </div>

  <script src="js/nav.js"></script>
  <script>
    // If Wix blocks the iframe (X-Frame-Options), the iframe errors silently.
    // Show the fallback after a short delay if the frame stays blank.
    const iframe = document.getElementById('blog-iframe');
    const embed  = document.getElementById('blog-embed');
    const fallback = document.getElementById('blog-fallback');

    let loaded = false;
    iframe.addEventListener('load', () => { loaded = true; });

    setTimeout(() => {
      if (!loaded) {
        embed.classList.add('hidden');
        fallback.classList.remove('hidden');
        fallback.classList.add('flex');
      }
    }, 6000);
  </script>
</body>
</html>
