<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Music Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>&#127758; World Music Explorer</h1>
  <p>Click a pin on the map or a country button to explore music from around the world!</p>
</header>
<div class="nav" id="nav"></div>
<div class="map-outer" id="map-outer">  <img id="map-img" src="world-map.jpg" alt="World map" draggable="false">

  <svg class="pins-layer" id="pins-svg" viewBox="0 0 2688 1536" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
    <defs>
      <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
        <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.5)"/>
      </filter>
    </defs>
    <g id="pins-group"></g>
  </svg>
</div>
<div id="info-panel">
  <div class="placeholder"><span class="big">&#128070;</span>Tap a pin or button to start exploring world music!</div>
</div>

<script src="app.js" defer></script>
</body>
</html>
